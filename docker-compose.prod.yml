# Override de producción: añade Caddy (HTTPS), Redis (escalado de Socket.IO)
# y MinIO (object storage para uploads).
#
# Uso:
#   1. Define DOMAIN, ACME_EMAIL, secretos y S3_PUBLIC_URL en un .env junto a este archivo.
#   2. Apunta el DNS de tu dominio a este servidor (puertos 80 y 443 abiertos).
#   3. docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Caddy obtiene y renueva los certificados TLS automáticamente.
services:
  # Redis: comparte eventos de Socket.IO entre varias instancias del backend.
  redis:
    image: redis:7-alpine
    container_name: fisio-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # MinIO: almacenamiento de objetos compatible con S3 para los uploads.
  minio:
    image: minio/minio:latest
    container_name: fisio-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-fisio}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-fisio-minio-secret}
    volumes:
      - fisio-minio:/data
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # consola web
    restart: unless-stopped

  # Crea el bucket y lo deja con lectura pública (una sola vez).
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-fisio}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-fisio-minio-secret}
      - S3_BUCKET=${S3_BUCKET:-fisio-uploads}
    entrypoint: >
      /bin/sh -c "
      until mc alias set fm http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY}; do echo 'esperando minio...'; sleep 2; done;
      mc mb -p fm/$${S3_BUCKET} || true;
      mc anonymous set download fm/$${S3_BUCKET} || true;
      echo 'bucket listo';
      "
    restart: "no"

  # El backend usa Redis + MinIO en producción.
  backend:
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      - REDIS_URL=redis://redis:6379
      - STORAGE_DRIVER=s3
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=${S3_BUCKET:-fisio-uploads}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-fisio}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-fisio-minio-secret}
      # URL pública del bucket, accesible desde el navegador (p. ej. https://files.tu-dominio.com
      # o http://TU_IP:9000/fisio-uploads). Debe ser alcanzable por los usuarios.
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-}

  caddy:
    image: caddy:2-alpine
    container_name: fisio-caddy
    depends_on:
      frontend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
  fisio-minio:
